<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalibility — ONYX</title>
  <script>
    (function () {
      var p = location.pathname;
      var last = p.split("/").pop() || "";
      if (!p.endsWith("/") && !/\.[a-z0-9]+$/i.test(last)) {
        location.replace(p + "/" + location.search + location.hash);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=20260530z" />
  <link rel="stylesheet" href="availability.css?v=20260601c" />
</head>
<body>
  <div class="app app--page app--availability">
    <header class="top">
      <div class="nyx-menu-container">
        <button type="button" class="nyx-menu-btn" id="nyx-menu-btn" aria-label="Open menu" aria-haspopup="true" aria-expanded="false" aria-controls="nyx-menu-dropdown">
          <svg class="nyx-menu-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 6h14" />
            <path d="M3 12h5l2-2h4l2 2h5" />
            <path d="M5 18h14" />
          </svg>
        </button>
        <div class="nyx-menu-dropdown" id="nyx-menu-dropdown" hidden>
          <nav class="nyx-menu-nav" id="nyx-menu-nav" aria-label="Site pages"></nav>
        </div>
      </div>
      <div class="top-hero">
        <div class="brand">
          <h1 class="brand-logo">
            <a class="brand-logo-link" href="../" aria-label="ONYX home">
              <div class="logo-container">
                <svg class="header-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%" role="img" aria-label="ONYX">
                  <title>ONYX</title>
                  <defs>
                    <linearGradient id="silverBase" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="#C8C8C8" />
                      <stop offset="30%" stop-color="#FFFFFF" />
                      <stop offset="60%" stop-color="#909090" />
                      <stop offset="100%" stop-color="#606060" />
                    </linearGradient>
                    <linearGradient id="sweepGrad" x1="-50%" y1="0%" x2="0%" y2="0%">
                      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                      <stop offset="40%" stop-color="rgba(255,255,255,0)" />
                      <stop offset="50%" stop-color="rgba(255,255,255,0.7)" />
                      <stop offset="60%" stop-color="rgba(255,255,255,0)" />
                      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                    </linearGradient>
                  </defs>

                  <rect width="100%" height="100%" fill="transparent" />

                  <g transform="translate(20, 10)" stroke="url(#silverBase)" fill="url(#silverBase)">
                    <polygon points="150,40 240,90 240,190 150,240 60,190 60,90" fill="none" stroke-width="4" stroke-linejoin="round" />
                    <line x1="150" y1="40" x2="150" y2="70" stroke-width="3" />
                    <line x1="150" y1="240" x2="150" y2="210" stroke-width="2" />
                    <line x1="60" y1="90" x2="90" y2="105" stroke-width="2" />
                    <line x1="240" y1="90" x2="210" y2="105" stroke-width="2" />
                    <line x1="60" y1="190" x2="90" y2="175" stroke-width="2" />
                    <line x1="240" y1="190" x2="210" y2="175" stroke-width="2" />
                    <polygon points="150,70 210,105 210,175 150,210 90,175 90,105" fill="none" stroke-width="1.5" stroke-dasharray="2,2" />
                    <polygon points="150,95 190,118 190,162 150,185 110,162 110,118" fill="rgba(255,255,255,0.03)" stroke-width="3" />
                    <polygon points="150,40 180,90 150,70" stroke-width="0" opacity="0.28" />
                  </g>

                  <text x="270" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="125" font-weight="200" fill="url(#silverBase)" letter-spacing="6" dominant-baseline="central">NYX</text>

                  <g class="header-logo-sweep-layer" transform="translate(20, 10)" stroke="url(#sweepGrad)" fill="url(#sweepGrad)">
                    <polygon points="150,40 240,90 240,190 150,240 60,190 60,90" fill="none" stroke-width="4" stroke-linejoin="round" />
                    <line x1="150" y1="40" x2="150" y2="70" stroke-width="3" />
                    <line x1="150" y1="240" x2="150" y2="210" stroke-width="2" />
                    <line x1="60" y1="90" x2="90" y2="105" stroke-width="2" />
                    <line x1="240" y1="90" x2="210" y2="105" stroke-width="2" />
                    <line x1="60" y1="190" x2="90" y2="175" stroke-width="2" />
                    <line x1="240" y1="190" x2="210" y2="175" stroke-width="2" />
                    <polygon points="150,70 210,105 210,175 150,210 90,175 90,105" fill="none" stroke-width="1.5" stroke-dasharray="2,2" />
                    <polygon points="150,95 190,118 190,162 150,185 110,162 110,118" fill="rgba(255,255,255,0.03)" stroke-width="3" />
                    <polygon points="150,40 180,90 150,70" stroke-width="0" opacity="0.28" />
                  </g>

                  <text class="header-logo-sweep-layer" x="270" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="125" font-weight="200" fill="url(#sweepGrad)" letter-spacing="6" dominant-baseline="central">NYX</text>
                </svg>
              </div>
            </a>
          </h1>
        </div>
      </div>
    </header>

    <main class="avail-dashboard" aria-label="Wave availability">
      <div class="avail-toolbar">
        <div class="avail-heading-block">
          <h2 id="availability-page-title">
            <span class="avail-heading-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <path d="M16 2v4M8 2v4M3 10h18" />
              </svg>
            </span>
            Availability
          </h2>
          <p class="avail-subtitle">Wave time availability by office</p>
        </div>
        <div class="avail-toolbar-actions">
          <p class="avail-updated" id="avail-updated">Updated —</p>
          <button type="button" class="avail-refresh-btn" id="avail-refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <path d="M21 3v6h-6" />
            </svg>
            Refresh
          </button>
        </div>
      </div>

      <div class="avail-filters">
        <div class="avail-office-tabs" id="avail-office-tabs" role="tablist" aria-label="Office"></div>
        <select class="avail-month-select" id="avail-month-select" aria-label="Month"></select>
      </div>

      <div class="avail-stats">
        <article class="avail-stat-card">
          <div>
            <p class="avail-stat-label">Open this month</p>
            <p class="avail-stat-value" id="avail-stat-open">0</p>
          </div>
          <span class="avail-stat-icon is-open" aria-hidden="true">✓</span>
        </article>
        <article class="avail-stat-card">
          <div>
            <p class="avail-stat-label">Full this month</p>
            <p class="avail-stat-value" id="avail-stat-full">0</p>
          </div>
          <span class="avail-stat-icon is-full" aria-hidden="true">✕</span>
        </article>
        <article class="avail-stat-card">
          <div>
            <p class="avail-stat-label">Available rate</p>
            <p class="avail-stat-value" id="avail-stat-rate">0%</p>
          </div>
          <span class="avail-stat-icon is-rate" aria-hidden="true">◷</span>
        </article>
      </div>

      <div class="avail-layout">
        <section class="avail-calendar-panel" aria-label="Monthly calendar">
          <div class="avail-panel-head">
            <h3 id="avail-calendar-title">—</h3>
            <div class="avail-legend">
              <span class="avail-legend-item"><span class="avail-dot is-open"></span> Open slots</span>
              <span class="avail-legend-item"><span class="avail-dot is-full"></span> Full</span>
              <span class="avail-legend-item"><span class="avail-dot is-empty"></span> No data</span>
            </div>
          </div>
          <div class="avail-calendar-grid" id="avail-calendar-grid"></div>
        </section>

        <aside class="avail-day-panel" aria-label="Day details">
          <h3 id="avail-day-title">Select a day</h3>
          <div class="avail-day-summary" id="avail-day-summary"></div>
          <div class="avail-slot-list" id="avail-slot-list"></div>
        </aside>
      </div>
    </main>
  </div>

  <script src="../menu.js?v=20260531y"></script>
  <script src="../header-logo.js?v=20260530z"></script>
  <script src="availability.js?v=20260601c"></script>
  <script src="../footer.js?v=20260531y"></script>
</body>
</html>
