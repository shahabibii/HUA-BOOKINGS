name: Update availability from Power Automate

on:
  repository_dispatch:
    types: [update-availability]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Write data/availability.json from dispatch payload
        env:
          AVAILABILITY_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/write-availability-json.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/availability.json
          if git diff --staged --quiet; then
            echo "availability.json already up to date."
          else
            git commit -m "Update wave availability from Power Automate."
            git push
          fi
