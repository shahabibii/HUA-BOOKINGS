name: Update tickets from Power Automate

on:
  repository_dispatch:
    types: [update-tickets]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write data/tickets.json from dispatch payload
        env:
          TICKETS_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/write-tickets-json.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tickets.json
          if git diff --staged --quiet; then
            echo "tickets.json already up to date."
          else
            git commit -m "Update live ticket counts from Power Automate."
            git push
          fi
