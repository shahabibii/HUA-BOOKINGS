name: Update tickets from Power Automate

on:
  repository_dispatch:
    types: [update-tickets]
  # Manual test from GitHub → Actions → this workflow → Run workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write data/tickets.json from dispatch payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node -e "
          const fs = require('fs');
          const payload = JSON.parse(process.env.PAYLOAD || '{}');
          const out = {
            updatedAt: payload.updatedAt || new Date().toISOString(),
            events: Array.isArray(payload.events) ? payload.events : [],
          };
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/tickets.json', JSON.stringify(out, null, 2) + '\n');
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tickets.json
          if git diff --staged --quiet; then
            echo "tickets.json already up to date."
          else
            git commit -m "Update live ticket counts from Power Automate."
            git push
          fi
